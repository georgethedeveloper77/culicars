name: culicars
description: Kenya vehicle history intelligence platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # Auth
  supabase_flutter: ^2.9.0

  # Payments
  purchases_flutter: ^8.0.0

  # Camera
  image_picker: ^1.1.2

  # WebView
  webview_flutter: ^4.10.0

  # Charts
  fl_chart: ^0.70.2

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Images
  cached_network_image: ^3.4.1

  # Share
  share_plus: ^10.1.4

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^6.2.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
